<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syed Sufiyan Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #181818;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); /* Gradient */
            width: 400px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 20px;
            object-fit: cover;
        }

        .card h1 {
            font-size: 1.8em;
            margin: 0;
        }

        .card h2 {
            font-size: 1.2em;
            color: #f0ad4e;
            margin: 10px 0 20px;
        }

        .card p {
            text-align: center;
            line-height: 1.5;
        }

        .social-icons {
            margin-top: 20px;
        }

        .social-icons a {
            color: white;
            margin: 0 10px;
            font-size: 1.5em;
            transition: color 0.3s ease;
        }

        .social-icons a:hover {
            color: #f0ad4e; /* Hover effect */
        }

    </style>
</head>
<body>

    <div class="card">
        <!-- Add your own image here -->
        
        <h1>Syed Sufiyan</h1>
        <h2>Web Developer</h2>
        <p>I'm a BCA graduate with a passion for building user-friendly and functional websites. I specialize in front-end and back-end development. Let's collaborate!</p>
        
        <div class="social-icons">
            <a href="https://linkedin.com/in/syedsufiyan888" target="_blank"><i class="fab fa-linkedin"></i></a>
            <a href="mailto:syedsufiyan4567@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
    </div>

</body>
</html>
